<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Creative Space</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a0e9ff, #fdfd96);
      color: #333;
      text-align: center;
    }

    header {
      padding: 30px;
      background: rgba(255, 255, 255, 0.6);
      border-bottom: 3px solid #fff;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      display: block;
      margin-top: 10px;
      font-size: 1.1rem;
    }

    .emoji {
      font-size: 2.5rem;
    }

    footer {
      margin: 40px 0;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <h1>🎨 My Creative Space</h1>
  <p>Welcome! This is my place for drawings, web pages, and fun projects 🚀</p>
</header>

<div class="container">

  <div class="card">
    <div class="emoji">🖍️</div>
    <div>My Drawings</div>
    <a href="drawings.html">Open</a>
  </div>

  <div class="card">
    <div class="emoji">💻</div>
    <div>My Web Pages</div>
    <a href="webpages.html">Open</a>
  </div>

  <div class="card">
    <div class="emoji">📁</div>
    <div>My Files</div>
    <a href="files.html">Open</a>
  </div>

  <div class="card">
    <div class="emoji">🧪</div>
    <div>Try-Out Lab</div>
    <a href="lab.html">Open</a>
  </div>

</div>

<footer>
  Made with ❤️ for learning and creativity
</footer>

</body>
</html>
